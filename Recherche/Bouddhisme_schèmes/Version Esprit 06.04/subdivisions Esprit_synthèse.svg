<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 700" width="1800" height="700">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- BULLE PRINCIPALE (vert d'eau doux) -->
  <rect x="550" y="20" width="280" height="70" rx="35" fill="#A8D5BA" stroke="#5D9B6B" stroke-width="2"/>
  <text x="680" y="58" text-anchor="middle" fill="#2C5E2E" font-size="22" font-weight="bold">L'ESPRIT</text>

  <!-- BRANCHE 1 : Niveaux (vert pâle) -->
  <rect x="50" y="150" width="240" height="50" rx="25" fill="#C8E6C9" stroke="#81C784" stroke-width="2"/>
  <text x="160" y="180" text-anchor="middle" fill="#1B5E20" font-size="16">1. Selon ses niveaux</text>
  <!-- Sous-bulles -->
  <rect x="5" y="230" width="140" height="44" rx="22" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="2"/>
  <text x="75" y="258" text-anchor="middle" fill="#33691E" font-size="14">esprit grossier</text>
  <rect x="150" y="230" width="140" height="44" rx="22" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="2"/>
  <text x="220" y="258" text-anchor="middle" fill="#33691E" font-size="14">esprit subtil</text>
  <rect x="300" y="230" width="160" height="44" rx="22" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="2"/>
  <text x="450" y="258" text-anchor="middle" fill="#33691E" font-size="14">esprit très subtil</text>

  <!-- BRANCHE 2 : Fonctions (rose pâle) -->
  <rect x="350" y="150" width="240" height="50" rx="25" fill="#F8BBD0" stroke="#F06292" stroke-width="2"/>
  <text x="470" y="180" text-anchor="middle" fill="#880E4F" font-size="16">2. Selon ses fonctions</text>
  <!-- Sous-bulles -->
  <rect x="350" y="230" width="160" height="44" rx="22" fill="#FCE4EC" stroke="#F48FB1" stroke-width="2"/>
  <text x="430" y="258" text-anchor="middle" fill="#880E4F" font-size="14">esprit principal</text>
  <rect x="530" y="230" width="160" height="44" rx="22" fill="#FCE4EC" stroke="#F48FB1" stroke-width="2"/>
  <text x="610" y="258" text-anchor="middle" fill="#880E4F" font-size="14">facteurs mentaux</text>

  <!-- BRANCHE 3 : Manière de s'engager (bleu ciel) -->
  <rect x="60" y="380" width="280" height="50" rx="25" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="2"/>
  <text x="200" y="410" text-anchor="middle" fill="#01579B" font-size="16">3. Manière de s'engager dans son objet</text>
  <!-- Sous-bulles -->
  <rect x="60" y="460" width="180" height="44" rx="22" fill="#E1F5FE" stroke="#81D4FA" stroke-width="2"/>
  <text x="150" y="488" text-anchor="middle" fill="#01579B" font-size="14">esprit conceptuel</text>
  <rect x="260" y="460" width="180" height="44" rx="22" fill="#E1F5FE" stroke="#81D4FA" stroke-width="2"/>
  <text x="350" y="488" text-anchor="middle" fill="#01579B" font-size="14">esprit non conceptuel</text>

  <!-- BRANCHE 4 : Condition dominante non commune (lavande) -->
  <rect x="530" y="380" width="300" height="50" rx="25" fill="#E1BEE7" stroke="#BA68C8" stroke-width="2"/>
  <text x="680" y="410" text-anchor="middle" fill="#4A148C" font-size="16">4. Condition dominante non commune</text>
  <!-- Sous-bulles -->
  <rect x="530" y="460" width="180" height="44" rx="22" fill="#F3E5F5" stroke="#CE93D8" stroke-width="2"/>
  <text x="620" y="488" text-anchor="middle" fill="#4A148C" font-size="14">percepteur sensoriel</text>
  <rect x="730" y="460" width="180" height="44" rx="22" fill="#F3E5F5" stroke="#CE93D8" stroke-width="2"/>
  <text x="820" y="488" text-anchor="middle" fill="#4A148C" font-size="14">percepteur mental</text>

  <!-- Lignes de liaison (gris clair) -->
  <line x1="490" y1="90" x2="180" y2="150" stroke="#AAA" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="90" x2="470" y2="150" stroke="#AAA" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="90" x2="200" y2="380" stroke="#AAA" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="90" x2="680" y2="380" stroke="#AAA" stroke-width="2" marker-end="url(#arrow)"/>
</svg>